slug: openai
name: OpenAI
aliases:
  - open_ai
logo_path: /static/provider-openai.svg
platform_key_env: OPENAI_API_KEY
requires_api_key: true
docs:
  api: https://developers.openai.com/api/reference/overview
  models: https://platform.openai.com/docs/models
  pricing: https://platform.openai.com/docs/pricing
  responses: https://platform.openai.com/docs/api-reference/responses/create
  realtime: https://developers.openai.com/api/docs/guides/realtime
  realtime_quickstart: https://platform.openai.com/docs/guides/realtime/quickstart
  tools: https://developers.openai.com/api/docs/guides/tools
  image_generation: https://developers.openai.com/api/docs/guides/image-generation
  speech_to_text: https://developers.openai.com/api/docs/guides/speech-to-text
  text_to_speech: https://developers.openai.com/api/docs/guides/text-to-speech
  embeddings: https://developers.openai.com/api/docs/guides/embeddings
  moderation: https://developers.openai.com/api/docs/guides/moderation
  batch: https://developers.openai.com/api/docs/guides/batch
  fine_tuning: https://developers.openai.com/api/docs/guides/fine-tuning
  vector_stores: https://platform.openai.com/docs/api-reference/vector-stores
  files: https://platform.openai.com/docs/api-reference/files
  changelog: https://developers.openai.com/changelog
connection_fields:
  - key: api_key
    label: API Key
    type: password
    required: true
    placeholder: sk-...
    description: Tenant BYOK key for OpenAI API access.
  - key: api_base
    label: API Base URL
    type: url
    required: false
    placeholder: https://api.openai.com/v1
    description: Optional override for OpenAI-compatible endpoints.
  - key: api_version
    label: API Version
    type: text
    required: false
    placeholder: ""
    description: Not required for OpenAI.
default_model: gpt-5-nano
recommended_models:
  - gpt-5.2
  - gpt-5.2-pro
  - gpt-5.2-codex
  - gpt-5.1
  - gpt-5.1-codex
  - gpt-5.1-codex-max
  - gpt-5
  - gpt-5-mini
  - gpt-5-nano
  - gpt-5-codex
  - gpt-5-pro
  - gpt-4.1
  - gpt-4.1-mini
  - gpt-4.1-nano
  - gpt-4o
  - gpt-4o-mini
  - o4-mini
  - o3
  - o3-pro
  - o3-mini
  - gpt-realtime
  - gpt-realtime-mini
  - gpt-image-1
  - text-embedding-3-large
  - text-embedding-3-small
