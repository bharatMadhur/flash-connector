model: o3-pro
display_name: o3-pro
family: o-series
category: reasoning
supports_realtime: false
supports_vision: false
supports_tools: true
notes: Higher-quality o3 profile tuned for complex reasoning.
parameters:
  max_output_tokens:
    supported: true
    type: integer
    min: 1
    max: 200000
    default: 2048
    description: Maximum output length.
  reasoning_effort:
    supported: true
    type: enum
    values: [low, medium, high]
    default: high
    description: Reasoning depth control.
    increase_effect: Improves quality for difficult tasks.
    decrease_effect: Reduces latency and spend.
  temperature:
    supported: false
    type: number
    min: 0
    max: 2
    description: Unsupported for this model family.
