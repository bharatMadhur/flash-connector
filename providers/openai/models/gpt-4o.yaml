model: gpt-4o
display_name: GPT-4o
family: gpt-4o
category: omni
supports_realtime: true
supports_vision: true
supports_tools: true
notes: Multimodal omni model.
parameters:
  max_output_tokens:
    supported: true
    type: integer
    min: 1
    max: 16384
    default: 1024
    description: Maximum output tokens.
  temperature:
    supported: true
    type: number
    min: 0
    max: 2
    default: 0.4
    description: Controls creativity/randomness.
  top_p:
    supported: true
    type: number
    min: 0
    max: 1
    default: 1
    description: Nucleus sampling control.
