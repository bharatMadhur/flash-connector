model: o3
display_name: o3
family: o-series
category: reasoning
supports_realtime: false
supports_vision: false
supports_tools: true
notes: High-reasoning O-series model.
parameters:
  max_output_tokens:
    supported: true
    type: integer
    min: 1
    max: 200000
    default: 1024
    description: Maximum output length.
  reasoning_effort:
    supported: true
    type: enum
    values: [minimal, low, medium, high]
    default: high
    description: Reasoning depth control.
    increase_effect: Higher quality for complex tasks.
    decrease_effect: Faster/cheaper responses.
  temperature:
    supported: false
    type: number
    min: 0
    max: 2
    description: Unsupported for this model family.
