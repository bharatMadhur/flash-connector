model: gpt-5-nano
display_name: GPT-5 Nano
family: gpt-5
category: reasoning
supports_realtime: true
supports_vision: false
supports_tools: true
notes: Cost-efficient GPT-5 variant.
parameters:
  max_output_tokens:
    supported: true
    type: integer
    min: 1
    max: 200000
    default: 512
    description: Output length ceiling.
    increase_effect: Longer output allowance.
    decrease_effect: More concise responses.
  temperature:
    supported: false
    type: number
    min: 0
    max: 2
    description: Not supported on GPT-5 family.
  reasoning_effort:
    supported: true
    type: enum
    values: [minimal, low, medium]
    default: low
    description: Controls effort spent on reasoning.
    increase_effect: Better reasoning quality, potentially higher latency.
    decrease_effect: Lower latency and cost.
