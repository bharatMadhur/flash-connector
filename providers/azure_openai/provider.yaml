slug: azure_openai
name: Azure OpenAI
aliases:
  - azure
  - azure-openai
  - azureopenai
logo_path: /static/provider-azure-openai.svg
platform_key_env: AZURE_OPENAI_API_KEY
requires_api_key: true
docs:
  api: https://learn.microsoft.com/en-us/azure/ai-foundry/openai/reference
  models: https://learn.microsoft.com/en-us/azure/ai-foundry/openai/concepts/models
  pricing: https://azure.microsoft.com/en-us/pricing/details/cognitive-services/openai-service/
  responses: https://learn.microsoft.com/en-us/azure/ai-foundry/openai/how-to/responses
  realtime: https://learn.microsoft.com/en-us/azure/ai-foundry/openai/how-to/realtime-audio-websockets
  chat_completions: https://learn.microsoft.com/en-us/azure/ai-foundry/openai/how-to/chatgpt
  image_generation: https://learn.microsoft.com/en-us/azure/ai-foundry/openai/how-to/dall-e
  speech_to_text: https://learn.microsoft.com/en-us/azure/ai-foundry/openai/how-to/audio-completions
  text_to_speech: https://learn.microsoft.com/en-us/azure/ai-foundry/openai/how-to/text-to-speech
  embeddings: https://learn.microsoft.com/en-us/azure/ai-services/openai/tutorials/embeddings
  batch: https://learn.microsoft.com/en-us/azure/ai-foundry/openai/how-to/batch
  fine_tuning: https://learn.microsoft.com/en-us/azure/ai-foundry/openai/how-to/fine-tuning
  files: https://learn.microsoft.com/en-us/rest/api/azureopenai/files
connection_fields:
  - key: api_key
    label: API Key
    type: password
    required: true
    placeholder: "<azure-api-key>"
    description: API key issued for your Azure OpenAI resource.
  - key: api_base
    label: Azure Base URL
    type: url
    required: true
    placeholder: https://your-resource.openai.azure.com/openai/v1
    description: Recommended to use OpenAI-compatible /openai/v1 endpoint.
  - key: api_version
    label: API Version
    type: text
    required: false
    placeholder: 2024-10-21
    description: Required only for legacy non-v1 endpoint mode.
default_model: gpt-5-nano
recommended_models:
  - gpt-5.2
  - gpt-5.2-pro
  - gpt-5.2-codex
  - gpt-5.1
  - gpt-5.1-codex
  - gpt-5.1-codex-max
  - gpt-5
  - gpt-5-pro
  - gpt-5-codex
  - gpt-5-mini
  - gpt-5-nano
  - gpt-4.1
  - gpt-4.1-mini
  - gpt-4.1-nano
  - gpt-4o
  - gpt-4o-mini
  - o4-mini
  - o3
  - o3-pro
  - o3-mini
  - gpt-realtime
  - gpt-realtime-mini
  - gpt-image-1
  - text-embedding-3-large
  - text-embedding-3-small
