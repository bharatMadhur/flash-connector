model: gpt-5.3-codex
display_name: GPT-5.3 Codex
family: gpt-5-codex
category: coding
supports_realtime: true
supports_vision: false
supports_tools: true
notes: Azure model catalog codex profile for latest GPT-5.3 coding deployments.
parameters:
  max_output_tokens:
    supported: true
    type: integer
    min: 1
    max: 400000
    default: 3072
    description: Maximum output token length.
  reasoning_effort:
    supported: true
    type: enum
    values: [minimal, low, medium, high]
    default: medium
    description: Reasoning depth for coding tasks.
  temperature:
    supported: false
    type: number
    min: 0
    max: 2
    description: Unsupported for default codex reasoning mode.
