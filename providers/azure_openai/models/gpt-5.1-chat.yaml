model: gpt-5.1-chat
display_name: GPT-5.1 Chat
family: gpt-5-chat
category: chat
supports_realtime: true
supports_vision: true
supports_tools: true
notes: Chat-optimized GPT-5.1 profile in Azure model catalog.
parameters:
  max_output_tokens:
    supported: true
    type: integer
    min: 1
    max: 200000
    default: 2048
    description: Output length ceiling.
  temperature:
    supported: true
    type: number
    min: 0
    max: 2
    default: 0.2
    description: Controls randomness.
  top_p:
    supported: true
    type: number
    min: 0
    max: 1
    default: 1
    description: Nucleus sampling cutoff.
