model: gpt-5.2-pro
display_name: GPT-5.2 Pro
family: gpt-5
category: reasoning
supports_realtime: true
supports_vision: true
supports_tools: true
notes: Azure OpenAI premium GPT-5.2 profile.
parameters:
  max_output_tokens:
    supported: true
    type: integer
    min: 1
    max: 400000
    default: 4096
    description: Upper bound on generated tokens.
  reasoning_effort:
    supported: true
    type: enum
    values: [low, medium, high]
    default: high
    description: Controls reasoning depth.
  temperature:
    supported: false
    type: number
    min: 0
    max: 2
    description: Unsupported for default pro reasoning mode.
