slug: azure_openai_deployment
name: Azure OpenAI (Deployment API)
models_from: azure_openai
aliases:
  - azure-openai-deployment
  - azure_openai_legacy
  - azure_legacy
logo_path: /static/provider-azure-openai.svg
platform_key_env: AZURE_OPENAI_API_KEY
requires_api_key: true
docs:
  api: https://learn.microsoft.com/en-us/azure/ai-foundry/openai/reference
  models: https://learn.microsoft.com/en-us/azure/ai-foundry/openai/concepts/models
  pricing: https://azure.microsoft.com/en-us/pricing/details/cognitive-services/openai-service/
  responses: https://learn.microsoft.com/en-us/azure/ai-foundry/openai/how-to/responses
  realtime: https://learn.microsoft.com/en-us/azure/ai-foundry/openai/how-to/realtime-audio-websockets
  chat_completions: https://learn.microsoft.com/en-us/azure/ai-foundry/openai/how-to/chatgpt
connection_fields:
  - key: api_key
    label: API Key
    type: password
    required: true
    placeholder: "<azure-api-key>"
    description: API key for your Azure OpenAI resource.
  - key: api_base
    label: Azure Resource Base URL
    type: url
    required: true
    placeholder: https://your-resource.openai.azure.com
    description: Resource root URL (no /openai/v1 suffix).
  - key: api_version
    label: API Version
    type: text
    required: true
    placeholder: 2025-01-01-preview
    description: Required for deployment-style Azure endpoints.
default_model: gpt-4.1-mini
recommended_models:
  - gpt-5.2
  - gpt-5.2-pro
  - gpt-5.2-codex
  - gpt-5.1
  - gpt-5.1-codex
  - gpt-5.1-codex-max
  - gpt-5
  - gpt-5-pro
  - gpt-5-codex
  - gpt-5-mini
  - gpt-5-nano
  - gpt-4.1
  - gpt-4.1-mini
  - gpt-4.1-nano
  - gpt-4o
  - gpt-4o-mini
  - o4-mini
  - o3
  - o3-pro
  - o3-mini
  - gpt-realtime
  - gpt-realtime-mini
  - gpt-image-1
  - text-embedding-3-large
  - text-embedding-3-small
